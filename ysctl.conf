# Maksimum açık dosya sayısı
fs.file-max = 65535

# Ağ bağlantı kuyruğunu artır (Binlerce kişi kapıya yüklendiğinde içeri alabilmek için)
net.core.somaxconn = 20000
net.ipv4.tcp_max_syn_backlog = 20000

# Hızlı bağlantı sonlandırma ve yeniden kullanma (Port darboğazını önler)
net.ipv4.tcp_tw_reuse = 1
net.ipv4.ip_local_port_range = 1024 65535
