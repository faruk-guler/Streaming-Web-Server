# Bekleyen bağlantı kuyruğunu artır (Sıra bekleyen izleyiciler için)
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# Port aralığını genişlet (Aynı anda binlerce bağlantı için)
net.ipv4.ip_local_port_range = 1024 65535

# Boştaki (TIME_WAIT) bağlantıları hızlıca temizle ve portu geri kazan
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# TCP pencere ölçeklemeyi aç (Yüksek bant genişliği verimliliği için)
net.ipv4.tcp_window_scaling = 1

# Paket kaybını önlemek için maksimum buffer boyutlarını artır
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Sistem genelinde açılabilir maksimum dosya sınırını yükselt
fs.file-max = 2097152

# Swapping'i azalt (Sistem belleği varken diski kullanma)
vm.swappiness = 10
