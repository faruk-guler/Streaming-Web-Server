<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GULER | Canlı Yayın</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; }
        .video-container { max-width: 960px; margin: 40px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .vjs-big-play-centered .vjs-big-play-button { line-height: 2.5em; height: 2.5em; width: 2.5em; border-radius: 50%; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex justify-content-center">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="guler.gif" alt="Logo" style="height: 50px; margin-right: 15px;">
                <h3 class="mb-0">GULER Canlı Yayın Sistemi</h3>
            </a>
        </div>
    </nav>

    <div class="container text-center">
        <div class="video-container">
            <video-js id="live_stream" class="video-js vjs-fluid vjs-default-skin vjs-big-play-centered" controls preload="auto">
                <source src="/hls/stream.m3u8" type="application/x-mpegURL">
            </video-js>
        </div>
    </div>

    <footer class="py-4 bg-dark mt-5 text-center">
        <p class="m-0 text-white small">GULER Canlı Yayın &copy; 2026</p>
    </footer>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // Oynatıcıyı Başlat
        var player = videojs('live_stream', {
            autoplay: 'muted', // Tarayıcı engeli için şart
            liveui: true,      // "CANLI" barı
            html5: { vhs: { overrideNative: true, enableLowInitialPlaylist: true } }
        });

        // OTOMATİK TEKRAR BAĞLANMA (RETRY)
        // Yayın kopsa veya henüz başlamamış olsa bile player bekler
        player.on('error', function() {
            var error = player.error();
            if (error.code === 4) {
                setTimeout(function() {
                    player.src({ src: "/hls/stream.m3u8", type: "application/x-mpegURL" });
                    player.load();
                    player.play();
                }, 3000);
            }
        });
    </script>
</body>
</html>
